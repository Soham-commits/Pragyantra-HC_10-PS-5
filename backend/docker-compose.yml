version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mediq-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=mediq_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - mediq-network

  backend:
    build: .
    container_name: mediq-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=mediq_db
    depends_on:
      - mongodb
    volumes:
      - ./app:/app/app
    networks:
      - mediq-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:

networks:
  mediq-network:
    driver: bridge
